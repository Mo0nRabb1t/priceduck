name: priceduck
description: "计价鸭 - 离线比价 App"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  drift: ">=2.22.1 <2.23.0"
  sqlite3_flutter_libs: ^0.5.28
  fl_chart: ^0.69.2
  path_provider: ^2.1.5
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ">=2.22.1 <2.23.0"
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/priceduck.jpeg

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/priceduck.jpeg"
  min_sdk_android: 21
